name: Auto-merge claude branches to main

on:
  push:
    branches:
      - 'claude/**'

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git pull origin main
          # Use -X theirs to auto-resolve conflicts by preferring the claude branch
          git merge ${{ github.ref_name }} --no-edit -X theirs
          git push origin main
          echo "✅ Successfully merged ${{ github.ref_name }} into main"
